services:
  workload-a:
    build: ./services/workload
    environment:
      - CLOUD_ID=a
      - BASE_LATENCY_MS=80
      - JITTER_MS=30
      - ERROR_RATE=0.01
      - PAYLOAD_KB=32
    ports:
      - "8001:8000"

  workload-b:
    build: ./services/workload
    environment:
      - CLOUD_ID=b
      - BASE_LATENCY_MS=120
      - JITTER_MS=40
      - ERROR_RATE=0.005
      - PAYLOAD_KB=64
    ports:
      - "8002:8000"

  # Optional third backend — activate with: docker compose --profile cloud-c up
  workload-c:
    build: ./services/workload
    profiles: ["cloud-c"]
    environment:
      - CLOUD_ID=c
      - BASE_LATENCY_MS=100
      - JITTER_MS=35
      - ERROR_RATE=0.008
      - PAYLOAD_KB=48
    ports:
      - "8003:8000"

  router:
    build:
      context: ./services
      dockerfile: router/Dockerfile
    environment:
      - BACKENDS_CONFIG_PATH=/etc/arbitrage/backends.json
      - ROUTER_ADMIN_TOKEN=${ROUTER_ADMIN_TOKEN:-changeme}
      - CB_FAIL_THRESHOLD=5
      - CB_OPEN_SECONDS=20
      - SHADOW_PERCENT=0.05
      - STICKY_HEADER=X-Sticky-Key
    volumes:
      - ./backends.json:/etc/arbitrage/backends.json:ro
    ports:
      - "8080:8000"
    depends_on:
      - workload-a
      - workload-b

  pricefeed:
    build:
      context: ./services
      dockerfile: pricefeed/Dockerfile
    environment:
      - BACKENDS_CONFIG_PATH=/etc/arbitrage/backends.json
    volumes:
      - ./backends.json:/etc/arbitrage/backends.json:ro
    ports:
      - "7070:8000"

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - router
      - workload-a
      - workload-b
      - pricefeed
      - bot

  grafana:
    image: grafana/grafana:11.1.4
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  bot:
    build:
      context: ./services
      dockerfile: bot/Dockerfile
    environment:
      - BACKENDS_CONFIG_PATH=/etc/arbitrage/backends.json
      - PROM_URL=http://prometheus:9090
      - ROUTER_URL=http://router:8000
      - ROUTER_ADMIN_TOKEN=${ROUTER_ADMIN_TOKEN:-changeme}
      - PRICEFEED_URL=http://pricefeed:8000

      - DECISION_INTERVAL_SECONDS=15
      - COOLDOWN_SECONDS=60
      - WINDOW=2m

      - MAX_P95_MS=200
      - MAX_ERROR_RATE=0.02
      - MIN_TOTAL_RPS=2

      - MIN_SAVINGS_PER_HOUR=0.001
      - SWITCHING_PENALTY_USD=0.0002

      - RAMP_STEPS=0.10,0.25,0.50,1.00
      - RAMP_STEP_MIN_SECONDS=45
      - REQUIRED_GOOD_WINDOWS=3
      - REQUIRED_BAD_WINDOWS=2

      - EG_COST_MODE=project_full_traffic
      - DB_PATH=/data/bot.db
      - BOT_METRICS_PORT=9101

      # Phase 1A: post-failover hysteresis
      - POST_FAILOVER_HOLD_SECONDS=300
      - POST_FAILOVER_CONFIRM_WINDOWS=5

      # Phase 1B: graceful drain
      - DRAIN_STEPS=4
      - DRAIN_STEP_SECONDS=10

      # Phase 1C: alerts (set ALERT_WEBHOOK_URL to a Slack webhook or HTTP endpoint)
      - ALERT_WEBHOOK_URL=${ALERT_WEBHOOK_URL:-}
      - ALERT_ON_FAILOVER=true
      - ALERT_ON_ROLLBACK=true
      - ALERT_ON_BAD_WINDOWS=true
      - ALERT_COST_THRESHOLD_USD_PER_HOUR=${ALERT_COST_THRESHOLD_USD_PER_HOUR:-}
      - BOT_INSTANCE_NAME=multicloud-bot

      # Phase 1D: REST API
      - BOT_API_PORT=9102
      - BOT_API_TOKEN=${BOT_API_TOKEN:-}
    volumes:
      - botdata:/data
      - ./backends.json:/etc/arbitrage/backends.json:ro
    ports:
      - "9101:9101"
      - "9102:9102"
    depends_on:
      - router
      - pricefeed

volumes:
  botdata:
