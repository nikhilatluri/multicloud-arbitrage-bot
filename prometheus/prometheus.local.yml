global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "router"
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:8080"]

  - job_name: "workload-a"
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:8001"]

  - job_name: "workload-b"
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:8002"]

  - job_name: "workload-c"
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:8003"]

  - job_name: "pricefeed"
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:7070"]

  - job_name: "bot"
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:9101"]
