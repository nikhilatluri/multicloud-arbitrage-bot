global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "router"
    metrics_path: /metrics
    static_configs:
      - targets: ["router:8000"]

  - job_name: "workload-a"
    metrics_path: /metrics
    static_configs:
      - targets: ["workload-a:8000"]

  - job_name: "workload-b"
    metrics_path: /metrics
    static_configs:
      - targets: ["workload-b:8000"]

  # Uncomment when running with --profile cloud-c
  # - job_name: "workload-c"
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets: ["workload-c:8000"]

  - job_name: "pricefeed"
    metrics_path: /metrics
    static_configs:
      - targets: ["pricefeed:8000"]

  - job_name: "bot"
    metrics_path: /metrics
    static_configs:
      - targets: ["bot:9101"]
